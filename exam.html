<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams | Scot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            background-color: #000000;
            position: relative;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #8a2be2; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #ddd; font-size: 0.9rem; transition: 0.3s; }
        .nav-links .active-pill {
            background: #8a2be2;
            padding: 5px 15px;
            border-radius: 5px;
            color: white !important;
        }
        .conn-tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            color: #888;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: inline-block;
        }
        .conn-active { border-color: #28a745; color: #28a745; background: rgba(40,167,69,0.1); }
        .hero {
            height: 35vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: linear-gradient(to bottom, #000, #080808);
        }
        .hero-content h2 { font-size: 3.5rem; letter-spacing: -1px; }
        .hero-content h2 span { color: #8a2be2; }
        .upload-section {
            padding: 30px 8%;
            background-color: #080808;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .custom-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border: 2px solid #8a2be2;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .custom-upload-btn:hover { background: rgba(138,43,226,0.15); }
        .publish-btn {
            background: #8a2be2;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .publish-btn:hover:not(:disabled) { background: #9d4edd; transform: translateY(-2px); }
        .publish-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #preview-box {
            max-width: 300px;
            margin: 20px auto;
            display: none;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .history-section {
            padding: 60px 8%;
        }
        .history-heading {
            font-size: 1rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .history-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1a1a1a;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .work-item {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }
        .work-item:hover {
            transform: translateY(-4px);
            border-color: #8a2be2;
            box-shadow: 0 8px 30px rgba(138,43,226,0.15);
        }
        .exam-number-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: #8a2be2;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            z-index: 2;
        }
        .work-item img {
            width: 100%;
            height: 750px;
            object-fit: contain;
            object-position: center;
            display: block;
            background: #111;
        }
        .card-content {
            padding: 16px 20px 20px;
            border-top: 1px solid #1a1a1a;
        }
        .exam-label {
            font-size: 0.7rem;
            color: #8a2be2;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .editable-title {
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .exam-meta {
            font-size: 0.75rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .exam-meta i { font-size: 0.7rem; }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #333;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            color: #222;
        }
        .empty-state p { font-size: 0.9rem; }
        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .hero-content h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Portfolio<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="exam.html" class="active-pill">Exams</a></li>
            <li><a href="https://www.facebook.com/skatiiz">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h2>EXAMS<span>_</span></h2>
            <div class="conn-tag conn-active">Connected to Firebase</div>
        </div>
    </header>

    <section class="upload-section">
        <img id="preview-box" src="" alt="Preview">
        <div class="btn-container">
            <label for="image-input" class="custom-upload-btn">
                <i class="fas fa-file-import"></i> SELECT EXAM IMAGE
            </label>
            <input type="file" id="image-input" accept="image/*" style="display:none">
            <button id="real-publish-btn" class="publish-btn">
                <i class="fas fa-paper-plane"></i> PUBLISH NOW
            </button>
        </div>
    </section>

    <section class="history-section">
        <p class="history-heading"><i class="fas fa-clock"></i> &nbsp;Exam History</p>
        <div id="gallery-grid" class="gallery-grid">
            <div class="empty-state" id="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No exams yet. Upload one above!</p>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb9Pe_HFjCF5HS-xRbzfmr_7sosxOhsD0",
            authDomain: "portfolio-7b46b.firebaseapp.com",
            projectId: "portfolio-7b46b",
            storageBucket: "portfolio-7b46b.firebasestorage.app",
            messagingSenderId: "432309410875",
            appId: "1:432309410875:web:fbc036b65790bb2846d01e",
            measurementId: "G-CVKF9CD08B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const imageInput = document.getElementById('image-input');
        const previewBox = document.getElementById('preview-box');
        const publishBtn = document.getElementById('real-publish-btn');
        const galleryGrid = document.getElementById('gallery-grid');
        const emptyState = document.getElementById('empty-state');

        let selectedImageBase64 = "";

        // --- Compress image to stay under Firestore's 1MB document limit ---
        function compressImage(file, maxWidth = 1200, quality = 0.75) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // --- Handle Image Selection ---
        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            previewBox.style.display = 'block';
            previewBox.src = '';

            selectedImageBase64 = await compressImage(file);
            previewBox.src = selectedImageBase64;
            publishBtn.style.display = 'inline-flex';
        });

        // --- Publish to "exam" collection in Firebase ---
        publishBtn.addEventListener('click', async () => {
            if (!selectedImageBase64) return;

            publishBtn.disabled = true;
            publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> UPLOADING...';

            try {
                await addDoc(collection(db, "exam"), {
                    image: selectedImageBase64,
                    timestamp: serverTimestamp(),
                    title: "Exam Result"
                });

                // Reset UI
                previewBox.style.display = 'none';
                previewBox.src = '';
                publishBtn.style.display = 'none';
                imageInput.value = "";
                selectedImageBase64 = "";

                // Refresh the history list
                await loadExams();

            } catch (error) {
                console.error("Firestore upload error:", error);

                if (error.code === 'permission-denied') {
                    alert("❌ Permission denied!\n\nFix: Go to Firebase Console → Firestore Database → Rules and set:\n\nallow read, write: if true;");
                } else if (error.message && error.message.includes('400')) {
                    alert("❌ Document too large!\n\nThe image is still too big after compression. Try a smaller image.");
                } else {
                    alert("❌ Upload failed: " + error.message);
                }
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerHTML = '<i class="fas fa-paper-plane"></i> PUBLISH NOW';
            }
        });

        // --- Load Exam History from Firebase ---
        async function loadExams() {
            try {
                const q = query(collection(db, "exam"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                galleryGrid.innerHTML = '';

                const docs = querySnapshot.docs;
                const total = docs.length;

                docs.forEach((doc, index) => {
                    const data = doc.data();
                    const date = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : "Just now";

                    const item = document.createElement('div');
                    item.className = 'work-item';
                    item.innerHTML = `
                        <div class="exam-number-badge">EXAM #${total - index}</div>
                        <img src="${data.image}" alt="Exam Image">
                        <div class="card-content">
                            <div class="exam-label">STUDENT SUBMISSION</div>
                            <div class="editable-title">${data.title}</div>
                            <div class="exam-meta"><i class="fas fa-calendar"></i> ${date}</div>
                        </div>
                    `;
                    galleryGrid.appendChild(item);
                });

            } catch (error) {
                console.error("Error loading exams:", error);
                if (error.code === 'permission-denied') {
                    emptyState.innerHTML = '<i class="fas fa-lock"></i><p>Permission denied. Update your Firestore rules.</p>';
                    emptyState.style.display = 'block';
                }
            }
        }

        // Load existing history on page load
        loadExams();
    </script>

</body>
</html>
