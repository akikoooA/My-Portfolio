<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams | Scot Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Consistent Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo span {
            color: #8a2be2;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #ddd;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* Active Pill set to Exams */
        .nav-links .active-pill {
            background: #8a2be2;
            padding: 5px 15px;
            border-radius: 5px;
            color: white !important;
        }

        /* Hero Section Styling */
        .hero {
            height: 60vh; /* Shorter hero for sub-pages */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            position: relative;
            background: linear-gradient(to bottom, #000, #050505);
        }

        .hero-content {
            max-width: 600px;
            z-index: 2;
        }

        .hero-content h2 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .hero-content h2 span {
            color: #8a2be2;
        }

        .hero-content p {
            color: #bbbbbb;
            font-size: 1rem;
        }

        /* Portfolio/Records Section */
        .portfolio-section {
            padding: 60px 8%;
            background-color: #050505;
        }

        .section-title {
            text-align: left;
            margin-bottom: 40px;
        }

        .section-title h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .section-title h2 span {
            color: #8a2be2;
        }

        /* Records Grid (Matches your Digital Collections) */
        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
        }

        .work-item {
            position: relative;
            background: #0a0a0a; 
            border-radius: 12px;
            aspect-ratio: 3/4; /* Matches your catchy portrait design */
            overflow: hidden;
            border: 2px solid #1a1a1a;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
            text-decoration: none;
        }

        .work-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0.8;
            transition: 0.5s;
        }

        .work-item:hover {
            border-color: #8a2be2;
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        .work-item:hover img {
            opacity: 1;
            transform: scale(1.05);
        }

        .work-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 25px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 30%, transparent);
        }

        .work-overlay h4 {
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .work-overlay .score {
            font-size: 0.8rem;
            color: #8a2be2;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .work-overlay .date {
            font-size: 0.75rem;
            color: #777;
        }

        /* Sidebar Styling */
        .social-sidebar {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .social-sidebar a {
            color: #fff;
            font-size: 1.2rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .social-sidebar a:hover {
            opacity: 1;
            color: #8a2be2;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero { padding-top: 100px; height: auto; text-align: center; }
            .social-sidebar { display: none; }
        }
    </style>
</head>

            <li><a href="https://www.facebook.com/skatiiz">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h2>Exam<span>_</span><br>Records</h2>
            <p>Archive of academic assessments, certifications, and technical examinations.</p>
        </div>

        <div class="social-sidebar">
            <a href="https://www.facebook.com/skatiiz" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/skatt_04/" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </section>

</body>
