<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes | Scot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            background-color: #000000;
            position: relative;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #8a2be2; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #ddd; font-size: 0.9rem; transition: 0.3s; }
        .nav-links .active-pill {
            background: #8a2be2;
            padding: 5px 15px;
            border-radius: 5px;
            color: white !important;
        }
        .conn-tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            color: #888;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: inline-block;
        }
        .conn-active { border-color: #28a745; color: #28a745; background: rgba(40,167,69,0.1); }
        .hero {
            height: 35vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: linear-gradient(to bottom, #000, #080808);
        }
        .hero-content h2 { font-size: 3.5rem; letter-spacing: -1px; }
        .hero-content h2 span { color: #8a2be2; }
        .upload-section {
            padding: 30px 8%;
            background-color: #080808;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .custom-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border: 2px solid #8a2be2;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .custom-upload-btn:hover { background: rgba(138,43,226,0.15); }
        .publish-btn {
            background: #8a2be2;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .publish-btn:hover:not(:disabled) { background: #9d4edd; transform: translateY(-2px); }
        .publish-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #preview-box {
            max-width: 300px;
            margin: 20px auto;
            display: none;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        /* Quiz History Section */
        .history-section {
            padding: 60px 8%;
        }
        .history-heading {
            font-size: 1rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .history-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1a1a1a;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .work-item {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }
        .work-item:hover {
            transform: translateY(-4px);
            border-color: #8a2be2;
            box-shadow: 0 8px 30px rgba(138,43,226,0.15);
        }
        .quiz-number-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: #8a2be2;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            z-index: 2;
        }
       .work-item img {
            width: 100%;
            height: 750px;
            object-fit: contain;
            object-position: center;
            display: block;
            background: #111;
        }
        .card-content {
            padding: 16px 20px 20px;
            border-top: 1px solid #1a1a1a;
        }
        .quiz-label {
            font-size: 0.7rem;
            color: #8a2be2;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .editable-title {
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .quiz-meta {
            font-size: 0.75rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .quiz-meta i { font-size: 0.7rem; }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #333;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            color: #222;
        }
        .empty-state p { font-size: 0.9rem; }
        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .hero-content h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Portfolio<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="quiz.html" class="active-pill">Quiz</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="exam.html">Exams</a></li>
            <li><a href="https://www.facebook.com/skatiiz">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h2>QUIZZES<span>_</span></h2>
            <div class="conn-tag conn-active">Connected</div>
        </div>
    </header>

    <section class="upload-section">
        <img id="preview-box" src="" alt="Preview">
        <div class="btn-container">
            <label for="image-input" class="custom-upload-btn">
                <i class="fas fa-file-import"></i> SELECT QUIZ IMAGE
            </label>
            <input type="file" id="image-input" accept="image/*" style="display:none">
            <button id="real-publish-btn" class="publish-btn">
                <i class="fas fa-paper-plane"></i> PUBLISH NOW
            </button>
        </div>
    </section>

    <section class="history-section">
        <p class="history-heading"><i class="fas fa-clock"></i> &nbsp;Quiz History</p>
        <div id="gallery-grid" class="gallery-grid">
            <div class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No quizzes yet. Upload one above!</p>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ✅ PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const imageInput  = document.getElementById("image-input");
        const previewBox  = document.getElementById("preview-box");
        const publishBtn  = document.getElementById("real-publish-btn");
        const galleryGrid = document.getElementById("gallery-grid");

        let selectedFile = null;

        // STEP 1 — User picks image → show preview + publish button
        imageInput.addEventListener("change", (e) => {
            selectedFile = e.target.files[0];
            if (!selectedFile) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                previewBox.src = ev.target.result;
                previewBox.style.display = "block";
                publishBtn.style.display = "inline-flex";
            };
            reader.readAsDataURL(selectedFile);
        });

        // STEP 2 — Publish button clicked → save Base64 image to Firestore
        publishBtn.addEventListener("click", () => {
            if (!selectedFile) return;

            if (selectedFile.size > 900000) {
                alert("Image too large! Please use an image under 900KB.");
                return;
            }

            publishBtn.disabled = true;
            publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publishing...';

            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64Image = ev.target.result;

                try {
                    await addDoc(collection(db, "quizzes"), {
                        imageUrl: base64Image,
                        title: "Quiz Image",
                        timestamp: serverTimestamp()
                    });
                    resetUI();
                } catch (err) {
                    console.error("Firestore error:", err);
                    alert("Failed to publish. Open browser console (F12) to see the error.");
                    resetUI();
                }
            };
            reader.readAsDataURL(selectedFile);
        });

        function resetUI() {
            publishBtn.disabled = false;
            publishBtn.innerHTML = '<i class="fas fa-paper-plane"></i> PUBLISH NOW';
            publishBtn.style.display = "none";
            previewBox.style.display = "none";
            imageInput.value = "";
            selectedFile = null;
        }

        // STEP 3 — Listen to Firestore in real-time → render images on page
       // STEP 3 — Listen to Firestore in real-time → render images on page
        const q = query(collection(db, "quizzes"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            galleryGrid.innerHTML = "";

            if (snapshot.empty) {
                galleryGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>No quizzes yet. Upload one above!</p>
                    </div>`;
                return;
            }

            let count = snapshot.size;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();

                // Format the timestamp nicely
                let dateStr = "Just now";
                if (data.timestamp) {
                    const d = data.timestamp.toDate();
                    dateStr = d.toLocaleDateString("en-US", {
                        month: "short",
                        day: "numeric",
                        year: "numeric"
                    });
                }

                const item = document.createElement("div");
                item.className = "work-item";
                item.innerHTML = `
                    <div class="quiz-number-badge">QUIZ ${count}</div>
                    <img src="${data.imageUrl}" alt="${data.title}" loading="lazy">
                    <div class="card-content">
                        <p class="quiz-label"><i class="fas fa-file-alt"></i> &nbsp;Quiz</p>
                        <p class="editable-title">${data.title}</p>
                        <p class="quiz-meta">
                            <i class="fas fa-calendar-alt"></i> ${dateStr}
                        </p>
                    </div>
                `;
                galleryGrid.appendChild(item);
                count--;
            });
        });
    </script>

</body>
</html>
