<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes | Scot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            background-color: #000000;
            position: relative; 
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #8a2be2; }

        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #ddd; font-size: 0.9rem; transition: 0.3s; }
        
        .nav-links .active-pill {
            background: #8a2be2;
            padding: 5px 15px;
            border-radius: 5px;
            color: white !important;
        }

        /* Connection Badge */
        .conn-tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            color: #888;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: inline-block;
        }
        .conn-active { border-color: #28a745; color: #28a745; background: rgba(40, 167, 69, 0.1); }

        /* Hero Section */
        .hero {
            height: 35vh; 
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: linear-gradient(to bottom, #000, #080808);
        }

        .hero-content h2 { font-size: 3.5rem; letter-spacing: -1px; }
        .hero-content h2 span { color: #8a2be2; }

        /* Controls */
        .upload-section {
            padding: 30px 8%;
            background-color: #080808;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .custom-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border: 2px solid #8a2be2;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .publish-btn {
            background: #8a2be2;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none; 
            transition: 0.3s;
        }
        .publish-btn:hover { background: #9d4edd; transform: translateY(-2px); }

        #preview-box {
            max-width: 300px;
            margin: 20px auto;
            display: none;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 60px 8%;
        }

        .work-item {
            background: #0a0a0a; 
            border-radius: 16px;
            border: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .work-item:hover {
            transform: translateY(-5px);
            border-color: #8a2be2;
        }

        .work-item img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid #1a1a1a;
        }

        .card-content { padding: 20px; text-align: center; }
        .editable-title { 
            color: white; 
            font-size: 1.2rem;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .hero-content h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Portfolio<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="quiz.html" class="active-pill">Quiz</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="exam.html">Exams</a></li>
            <li><a href="https://www.facebook.com/skatiiz">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <div id="db-status" class="conn-tag">Connecting to Database...</div>
            <h2>QUIZZES<span>_</span></h2>
            <p id="status-text">Your published results are synced directly with Firebase Firestore.</p>
        </div>
    </header>

    <section class="upload-section">
        <img id="preview-box" src="" alt="Preview">
        
        <div class="btn-container">
            <label for="image-input" class="custom-upload-btn">
                <i class="fas fa-file-import"></i> SELECT QUIZ IMAGE
            </label>
            <input type="file" id="image-input" accept="image/*" style="display:none">
            
            <button id="real-publish-btn" class="publish-btn">
                <i class="fas fa-paper-plane"></i> PUBLISH NOW
            </button>
        </div>
    </section>

    <main class="gallery-grid" id="gallery-root"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb9Pe_HFjCF5HS-xRbzfmr_7sosxOhsD0",
            authDomain: "portfolio-7b46b.firebaseapp.com",
            projectId: "portfolio-7b46b",
            storageBucket: "portfolio-7b46b.firebasestorage.app",
            appId: "1:432309410875:web:fbc036b65790bb2846d01e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const imgInput = document.getElementById('image-input');
        const pubBtn = document.getElementById('real-publish-btn');
        const preview = document.getElementById('preview-box');
        const gallery = document.getElementById('gallery-root');
        const dbStatus = document.getElementById('db-status');
        const statusText = document.getElementById('status-text');

        if (db) {
            dbStatus.textContent = "Database Connected ✓";
            dbStatus.classList.add('conn-active');
        }

        let selectedFile = null;

        imgInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                preview.src = URL.createObjectURL(selectedFile);
                preview.style.display = "block";
                pubBtn.style.display = "inline-block";
                statusText.textContent = "Image ready to publish.";
            }
        });

        pubBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            pubBtn.disabled = true;
            statusText.textContent = "Publishing to cloud...";

            try {
                const storageRef = ref(storage, `quizzes/${Date.now()}_${selectedFile.name}`);
                const snapshot = await uploadBytes(storageRef, selectedFile);
                const url = await getDownloadURL(snapshot.ref);

                // This section now matches your screenshot fields exactly
                await addDoc(collection(db, "quizzes"), {
                    title: selectedFile.name.split('.')[0],
                    imgUrl: url,
                    createdAt: serverTimestamp()
                });

                preview.style.display = "none";
                pubBtn.style.display = "none";
                selectedFile = null;
                statusText.textContent = "Successfully published!";
            } catch (err) {
                console.error(err);
                statusText.textContent = "Error! Check Firebase rules.";
            } finally {
                pubBtn.disabled = false;
            }
        });

        const q = query(collection(db, "quizzes"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            gallery.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (!data.imgUrl) return;

                const item = document.createElement('div');
                item.className = 'work-item';
                item.innerHTML = `
                    <img src="${data.imgUrl}" alt="Quiz Screenshot">
                    <div class="card-content">
                        <b class="editable-title">${data.title || 'Untitled Quiz'}</b>
                    </div>
                `;
                gallery.appendChild(item);
            });
        });
    </script>
</body>
</html>
