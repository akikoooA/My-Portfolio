<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes | Scot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            background-color: #000000;
            position: relative; 
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #8a2be2; }

        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #ddd; font-size: 0.9rem; transition: 0.3s; }
        
        .nav-links .active-pill {
            background: #8a2be2;
            padding: 5px 15px;
            border-radius: 5px;
            color: white !important;
        }

        .hero {
            height: 30vh; 
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: linear-gradient(to bottom, #000, #050505);
        }

        .hero-content h2 { font-size: 3rem; }
        .hero-content h2 span { color: #8a2be2; }

        .upload-section {
            padding: 20px 8%;
            background-color: #050505;
            text-align: center;
        }

        .custom-upload-btn {
            display: inline-block;
            padding: 12px 25px;
            border: 2px solid #8a2be2;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .custom-upload-btn:hover { background: #8a2be2; }
        #image-input { display: none; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px 8%;
        }

        .work-item {
            background: #0a0a0a; 
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        .work-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .card-content { padding: 15px; }
        
        .editable-title {
            background: transparent;
            border: 1px dashed transparent;
            color: white;
            font-size: 1rem;
            width: 100%;
            padding: 5px;
            outline: none;
        }

        .editable-title:focus {
            border-color: #8a2be2;
            background: #111;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #8a2be2;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .delete-btn { color: #ff4d4d; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Portfolio<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="quiz.html" class="active-pill">Quiz</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="exam.html" >Exams</a></li>
            <li><a href="https://www.facebook.com/skatiiz">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h2>QUIZZES<span>_</span></h2>
            <p id="status-text">Uploading to Firebase will update this gallery in real-time.</p>
        </div>
    </header>

    <section class="upload-section">
        <label for="image-input" class="custom-upload-btn">
            <i class="fas fa-plus"></i> ADD NEW QUIZ
        </label>
        <input type="file" id="image-input" accept="image/*" multiple>
    </section>

    <main class="gallery-grid" id="gallery"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb9Pe_HFjCF5HS-xRbzfmr_7sosxOhsD0",
            authDomain: "portfolio-7b46b.firebaseapp.com",
            projectId: "portfolio-7b46b",
            storageBucket: "portfolio-7b46b.firebasestorage.app",
            messagingSenderId: "432309410875",
            appId: "1:432309410875:web:fbc036b65790bb2846d01e",
            measurementId: "G-CVKF9CD08B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const gallery = document.getElementById('gallery');
        const imageInput = document.getElementById('image-input');
        const statusText = document.getElementById('status-text');

        // REAL-TIME LISTENER: This makes the image show up immediately after upload
        const q = query(collection(db, "quizzes"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            gallery.innerHTML = "";
            snapshot.forEach((doc) => {
                renderCard(doc.data().imgUrl, doc.data().title, doc.id);
            });
            if (snapshot.empty) {
                gallery.innerHTML = "<p style='grid-column: 1/-1; text-align: center; opacity: 0.5;'>No quizzes found.</p>";
            }
        });

        // UPLOAD TO FIREBASE STORAGE & FIRESTORE
        imageInput.addEventListener('change', async function() {
            const files = Array.from(this.files);
            if (files.length === 0) return;

            statusText.textContent = "Uploading to Database...";
            
            for (const file of files) {
                try {
                    const storageRef = ref(storage, `quizzes/${Date.now()}_${file.name}`);
                    const snapshot = await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(snapshot.ref);

                    // These fields match your Firebase console screenshot
                    await addDoc(collection(db, "quizzes"), {
                        title: file.name.split('.')[0],
                        imgUrl: url,
                        createdAt: serverTimestamp() 
                    });
                } catch (e) {
                    console.error("Upload error:", e);
                    statusText.textContent = "Upload failed. Check Firebase Rules.";
                }
            }
            statusText.textContent = "Upload Complete!";
            setTimeout(() => { statusText.textContent = "Click titles to edit."; }, 3000);
        });

        function renderCard(imgSrc, title, id) {
            const card = document.createElement('div');
            card.className = 'work-item';
            card.innerHTML = `
                <img src="${imgSrc}" alt="${title}">
                <div class="card-content">
                    <input type="text" class="editable-title" value="${title}" onchange="updateTitle('${id}', this.value)">
                    <div class="card-actions">
                        <button class="action-btn" onclick="triggerChange('${id}')">Change Image</button>
                        <button class="action-btn delete-btn" onclick="deleteItem('${id}')">Remove</button>
                    </div>
                    <input type="file" id="input-${id}" style="display:none" accept="image/*">
                </div>
            `;
            gallery.appendChild(card);

            const changeInput = card.querySelector(`#input-${id}`);
            changeInput.addEventListener('change', async function() {
                if (this.files[0]) {
                    statusText.textContent = "Updating image...";
                    const storageRef = ref(storage, `quizzes/${Date.now()}_${this.files[0].name}`);
                    const snapshot = await uploadBytes(storageRef, this.files[0]);
                    const newUrl = await getDownloadURL(snapshot.ref);
                    
                    await updateDoc(doc(db, "quizzes", id), { imgUrl: newUrl });
                    statusText.textContent = "Database Updated!";
                }
            });
        }

        window.updateTitle = async (id, val) => {
            await updateDoc(doc(db, "quizzes", id), { title: val });
        };

        window.deleteItem = async (id) => {
            if (confirm("Delete permanently from Database?")) {
                await deleteDoc(doc(db, "quizzes", id));
            }
        };

        window.triggerChange = (id) => {
            document.getElementById(`input-${id}`).click();
        };
    </script>
</body>
</html>
