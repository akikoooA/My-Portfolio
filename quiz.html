<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes | Scot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent: #8a2be2;
            --bg-dark: #000000;
            --bg-card: #0a0a0a;
            --border: #1a1a1a;
            --text-gray: #bbbbbb;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 8%;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.8rem; font-weight: bold; }
        .logo span { color: var(--accent); }
        .nav-links { list-style: none; display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: #ddd; }
        .nav-links .active-pill {
            background: var(--accent);
            padding: 8px 20px;
            border-radius: 50px;
            color: white !important;
        }

        /* Layout UI */
        .hero { padding: 80px 8% 40px; max-width: 1400px; margin: 0 auto; }
        .hero h2 { font-size: 5rem; font-weight: 800; }
        .hero h2 span { color: var(--accent); }

        .controls {
            padding: 40px 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: linear-gradient(to bottom, #050505, #000);
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: white; }
        .btn-outline.active { border-color: var(--accent); color: var(--accent); }

        /* Gallery */
        .gallery-container { padding: 40px 8%; max-width: 1600px; margin: 0 auto; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 50px;
        }

        .quiz-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
        }
        .img-box { width: 100%; height: 650px; background: #111; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .card-info { padding: 30px; }
        .card-title {
            background: transparent; border: 1px solid transparent;
            color: white; font-size: 1.5rem; font-weight: 700; width: 100%;
            outline: none; padding: 5px;
        }

        /* Edit Mode Hide/Show */
        .edit-ui { display: none; margin-top: 15px; gap: 10px; }
        body.edit-mode .edit-ui { display: flex; }
        body.edit-mode .card-title { border-color: #333; background: #111; }

        .mini-btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .btn-del { border-color: #ff4444; color: #ff4444; }

        @media (max-width: 768px) {
            .hero h2 { font-size: 3rem; }
            .gallery-grid { grid-template-columns: 1fr; }
            .img-box { height: 450px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Portfolio<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="quiz.html" class="active-pill">Quiz</a></li>
            <li><a href="activities.html">Activities</a></li>
            <li><a href="https://www.facebook.com/skatiiz">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <span style="color:var(--accent); font-weight: 800; letter-spacing: 3px;">DATABASE CONNECTED</span>
        <h2>QUIZ RECORDS<span>_</span></h2>
        <p>Real-time storage powered by Firebase.</p>
    </header>

    <section class="controls">
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-primary" onclick="document.getElementById('file-in').click()">
                <i class="fas fa-plus"></i> Upload New
            </button>
            <button class="btn btn-outline" id="toggle-edit">
                <i class="fas fa-edit"></i> Manage Mode
            </button>
        </div>
        <div id="status-msg" style="color: var(--text-gray);">Ready</div>
        <input type="file" id="file-in" style="display:none" accept="image/*" multiple>
    </section>

    <main class="gallery-container">
        <div class="gallery-grid" id="gallery"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Ang iyong Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCb9Pe_HFjCF5HS-xRbzfmr_7sosxOhsD0",
            authDomain: "portfolio-7b46b.firebaseapp.com",
            projectId: "portfolio-7b46b",
            storageBucket: "portfolio-7b46b.firebasestorage.app",
            messagingSenderId: "432309410875",
            appId: "1:432309410875:web:fbc036b65790bb2846d01e",
            measurementId: "G-CVKF9CD08B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const gallery = document.getElementById('gallery');
        const fileIn = document.getElementById('file-in');
        const statusMsg = document.getElementById('status-msg');

        // 1. Load data mula sa Firestore
        async function loadData() {
            gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Loading quizzes...</p>';
            try {
                const q = query(collection(db, "quizzes"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                gallery.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    renderCard(doc.data().imgUrl, doc.data().title, doc.id);
                });
            } catch (e) {
                console.error("Error loading:", e);
                statusMsg.textContent = "Error loading data.";
            }
        }

        // 2. Upload function
        fileIn.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            statusMsg.textContent = `Uploading ${files.length} image(s)...`;

            for (const file of files) {
                try {
                    // Upload sa Storage
                    const storageRef = ref(storage, `quizzes/${Date.now()}_${file.name}`);
                    const snapshot = await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(snapshot.ref);

                    // Save sa Firestore
                    await addDoc(collection(db, "quizzes"), {
                        title: file.name.split('.')[0],
                        imgUrl: url,
                        createdAt: new Date()
                    });
                } catch (err) {
                    console.error("Upload error:", err);
                }
            }
            statusMsg.textContent = "Done!";
            loadData();
        });

        // 3. UI Rendering
        function renderCard(src, title, id) {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <div class="img-box"><img src="${src}"></div>
                <div class="card-info">
                    <span style="color:var(--accent); font-size:0.8rem; font-weight:800;">RECORD</span>
                    <input type="text" class="card-title" value="${title}" readonly>
                    <div class="edit-ui">
                        <button class="mini-btn btn-del" onclick="window.deleteItem('${id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;
            gallery.appendChild(card);
        }

        // Delete function
        window.deleteItem = async (id) => {
            if(confirm("Permanently delete this quiz?")) {
                statusMsg.textContent = "Deleting...";
                await deleteDoc(doc(db, "quizzes", id));
                statusMsg.textContent = "Deleted.";
                loadData();
            }
        };

        // Manage Mode Toggle
        document.getElementById('toggle-edit').addEventListener('click', function() {
            document.body.classList.toggle('edit-mode');
            this.classList.toggle('active');
        });

        // Initial Load
        loadData();
    </script>
</body>
</html>
